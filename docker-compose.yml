services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: pedeai-rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin123}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  backend:
    build:
      context: .
      dockerfile: backend/server/Dockerfile
    container_name: pedeai-backend
    ports:
      - "8000:8000"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin123}
      DJANGO_DB_PATH: /data/db.sqlite3
    volumes:
      - db_data:/data
    depends_on:
      - rabbitmq
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/restaurants/')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  status-consumer:
    build:
      context: .
      dockerfile: backend/server/Dockerfile
    container_name: pedeai-status-consumer
    command: ["consume_status"]
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin123}
      DJANGO_DB_PATH: /data/db.sqlite3
    volumes:
      - db_data:/data
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: pedeai-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  rabbitmq_data:
  db_data:
